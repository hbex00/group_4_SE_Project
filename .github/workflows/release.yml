
name: Build docker image on release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v3
      with:
        python-version: "3.14"
    - run: pip install pytest coverage Flask-SQLAlchemy
    - run: PYTHONPATH=src 
    - run: pytest

    - run: docker build -t therecipebox .
    - run: docker save therecipebox -o therecipebox.tar
    - uses: actions/upload-artifact@v4
      with: 
        name: therecipebox_:${{ github.ref_name }}
        path: therecipebox-image.zip
    - run: |
        gh release create ${{ github.ref_name }} \
          therecipebox_${{ github.ref_name }}.zip \
          --title "Release ${{ github.ref_name }}" \
          --notes "Automated release"
    env:
        GITHUB_TOKEN: ${{ github.token }}