{% extends 'base.html' %}

{% block head %}

    <title>Comment</title>
    <link rel="stylesheet" href="../static/CSS/comment.css">

{% endblock %}

{% block main_body %}
    <div class="whole_input_page">
        <form action="/comment" method="POST">
            <div class="recipe_id_container">
                <h2>Recipe id to comment on</h2>
                <input type="text" name="recipe_id" placeholder="Recipe id" size="20">
            </div>

            <div class="comment">
                <h2>Comment</h2>
                <input type="text" name="comment" placeholder="Comment" size="50">
            </div>

            <input type="submit" value="Post comment">
        </form>
    </div>

    <script src="../static/JS/addrecipe.js"></script>

{% endblock %}
