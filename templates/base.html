<!--

This file is the base file with HTML features that are shared
between all the HTML pages, thanks to the jinja2 syntax we 
can write in separate files and import to this one before 
rendering.

Current features are:
 * top bar with:
   * logo - clikc => change to homepage?
   * Title
   * User icon - click => change to login (not implemented)?

-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/CSS/topbar.css">
    <link rel="stylesheet" href="../static/CSS/footer.css">
    {% block head %} {% endblock %}
</head>
    <body>
        <header>
            <div class="logo">
                <form action="/">
                    <div id="logo">
                        <h1>TheRecipeBox</h1>
                    </div>
                </form>
            </div>

            <div class="title">
                <ul>
                    <li>Trending</li>
                    <li>Popular</li>
                    <li>Seasonal</li>
                </ul>
            </div>

            <div>
                {% if session.get('username') is not none %}
                <p>{{session.get('username')}}hugo</p>
                {%endif%}
                <form action="/login" id="user">
                    <div class="user_icon">
                        <!--Credit: https://www.iconpacks.net/free-icon/user-3295.html-->
                        <svg id="user_icon" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" viewBox="0 0 256 256" xml:space="preserve">
                            <g style="stroke: none; stroke-width: 0; stroke-dasharray: none; stroke-linecap: butt; stroke-linejoin: miter; stroke-miterlimit: 10; fill: none; fill-rule: nonzero; opacity: 1;" transform="translate(1.4065934065934016 1.4065934065934016) scale(2.81 2.81)">
                                <path d="M 45 53.718 c -10.022 0 -18.175 -8.153 -18.175 -18.175 S 34.978 17.368 45 17.368 c 10.021 0 18.175 8.153 18.175 18.175 S 55.021 53.718 45 53.718 z" style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-linejoin: miter; stroke-miterlimit: 10; fill: currentColor; fill-rule: nonzero; opacity: 1;" transform=" matrix(1 0 0 1 0 0) " stroke-linecap="round"/>
                                <path d="M 45 0 C 20.187 0 0 20.187 0 45 c 0 24.813 20.187 45 45 45 c 24.813 0 45 -20.187 45 -45 C 90 20.187 69.813 0 45 0 z M 74.821 70.096 c -3.543 -5.253 -8.457 -9.568 -14.159 -12.333 c -2.261 -1.096 -4.901 -1.08 -7.247 0.047 c -2.638 1.268 -5.47 1.91 -8.415 1.91 c -2.945 0 -5.776 -0.643 -8.415 -1.91 c -2.343 -1.125 -4.984 -1.143 -7.247 -0.047 c -5.702 2.765 -10.616 7.08 -14.16 12.333 C 9.457 63.308 6 54.552 6 45 C 6 23.495 23.495 6 45 6 s 39 17.495 39 39 C 84 54.552 80.543 63.308 74.821 70.096 z" style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-linejoin: miter; stroke-miterlimit: 10; fill: currentColor; fill-rule: nonzero; opacity: 1;" transform=" matrix(1 0 0 1 0 0) " stroke-linecap="round"/>
                            </g>
                        </svg>
                    </div>
                </form>
            </div>
        </header>
        <script src="../static/JS/topbar.js"></script>
        <main>
            {% block main_body %} {% endblock%}
        </main>
        <footer>
            {% block bottom%} {% endblock%}
        </footer>
    </body>
</html>
