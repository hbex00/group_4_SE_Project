{% extends 'base.html' %}

{% block head %}

    <title>Reset Password</title>
    <link rel="stylesheet" href="../static/CSS/password-reset.css">

{% endblock %}


{% block main_body %}
        <div class="password-page">
            <div class="border">
                <form action="/pw-reset" method="post">
                    <div class="login">
                        <h2>Reset the password to your account</h2>
                        <input type="text" name="email" placeholder="email" size="12">
                        <input type="text" name="name" placeholder="name" size="12">
                        <input type="password" name="password1" placeholder="new password" size="12">
                        <input type="password" name="password2" placeholder="Repeat password" size="12">
                        <input type="submit"value="Reset Password">
                    </div>
                </form> 
            </div>
        </div>
        <script src="../static/JS/password-reset.js"></script>
{% endblock %}

{% block bottom %}
    <p>It is prohibited to access an account you do not have 
       permission to access and could lead to legal consequences
        </p>
{% endblock %}
