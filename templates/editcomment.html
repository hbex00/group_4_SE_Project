{% extends 'base.html' %}

{% block head %}

    <title>Comment</title>
    <link rel="stylesheet" href="../static/CSS/comment.css">

{% endblock %}

{% block main_body %}
<div class="whole_input_page">
        <form action="/edit-comment" id="comment_form" method="POST">
            <div class="recipe_id_container">
                <h2>Comment on recipe: {{recipe.recipe_title}}</h2>
                <input type="hidden" name="recipe_id" value="{{recipe.id}}">
                <input type="hidden" name="comment_id" value="{{comment.id}}">
            </div>
            <div class="comment">
                <h2>Comment</h2>
                <input type="text" name="content" placeholder="How did it taste? Any substitions?" size="50" autocomplete="off">
            </div>

            <input type="submit" id="submit" value="Edit review">
        </form>
    </div>
{% endblock %}
